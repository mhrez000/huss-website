name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Static export can't run route handlers — the demo forms simulate
      # success client-side via NEXT_PUBLIC_DEMO instead.
      - name: Remove server-only API routes (static demo)
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_DEMO: "1"
          NEXT_PUBLIC_BASE_PATH: /huss-website

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
